<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body
    style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0a0a0a;
      color: #fafafa;
      padding: 40px 20px;
    "
  >
    <div
      style="
        max-width: 480px;
        margin: 0 auto;
        background-color: #171717;
        border-radius: 16px;
        padding: 32px;
        border: 1px solid #262626;
      "
    >
      <div style="text-align: center; margin-bottom: 24px">
        <div
          style="
            width: 64px;
            height: 64px;
            background: linear-gradient(320deg, #ef444466, #ef4444, #dc2626);
            border-radius: 12px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
          "
        >
          <span style="color: white; font-weight: bold; font-size: 24px">A</span>
        </div>
        <h1 style="color: #ffffff; font-size: 24px; margin: 0">{{appName}}</h1>
      </div>

      <h2 style="color: #ffffff; font-size: 18px; margin-bottom: 16px">
        Reset your password
      </h2>

      <p style="color: #a3a3a3; line-height: 1.6; margin-bottom: 24px">
        You requested to reset your password. Click the button below to proceed.
      </p>

      <a
        href="{{resetUrl}}"
        style="
          display: block;
          background: linear-gradient(320deg, #ef444466, #ef4444, #dc2626);
          color: #ffffff;
          text-decoration: none;
          padding: 14px 24px;
          border-radius: 8px;
          text-align: center;
          font-weight: 600;
          margin-bottom: 24px;
        "
      >
        Reset Password
      </a>

      <p style="color: #737373; font-size: 14px; line-height: 1.6; margin-bottom: 16px">
        This link will expire in <strong style="color: #a3a3a3">1 hour</strong>.
      </p>

      <p style="color: #737373; font-size: 14px; line-height: 1.6">
        If you didn't request this, you can safely ignore this email.
      </p>

      <hr style="border: none; border-top: 1px solid #262626; margin: 24px 0" />

      <p style="color: #525252; font-size: 12px; text-align: center">
        © {{year}} {{appName}}. All rights reserved.
      </p>
    </div>
  </body>
</html>
